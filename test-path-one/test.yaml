apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-path-one
  namespace: microservices
  labels:
    app: test-path-one
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-path-one
  template:
    metadata:
      labels:
        app: test-path-one
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: test-path-one
  namespace: microservices
  labels:
    app: test-path-one
spec:
  type: ClusterIP
  selector:
    app: test-path-one
  ports:
    - name: http
      port: 80
      targetPort: 80
